# ============================================================
# Lingmo Repo Sync — 生产同步工作流
#
# 在服务器上执行完整的 OBS → aptly → R2 → Pages 同步流程：
#   1. 拉取 OBS 仓库到本地缓存（lftp）
#   2. 重建 aptly Repository 并导入软件包
#   3. 创建 Snapshot 并发布到本地
#   4. 同步到 Cloudflare R2（对象存储）
#   5. 生成目录索引并部署到 Cloudflare Pages
#   6. 打包并上传到 GitHub Packages（备份）
#
# 触发器：
#   - workflow_dispatch: 手动触发
#   - schedule: 每 6 小时自动同步（生产环境按需调整）
#
# 所需 Secrets：
#   - GPG_KEY: GPG 密钥 ID
#   - GPG_PRIVATE_KEY: GPG 私钥（用于签名）
#   - R2_ACCOUNT_ID: Cloudflare 账户 ID
#   - R2_ACCESS_KEY_ID: R2 访问密钥 ID
#   - R2_SECRET_ACCESS_KEY: R2 访问密钥
#   - R2_BUCKET: R2 存储桶名称（可选，默认 lingmo-repo）
#   - R2_PUBLIC_URL: R2 公开访问域名（可选）
#   - CF_API_TOKEN: Cloudflare API Token（用于 Pages 部署）
#   - CF_PAGES_PROJECT: Pages 项目名称（可选，默认 lingmo-repo-index）
# ============================================================

name: Sync

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run 模式（只拉取，不导入/发布）"
        type: boolean
        default: false
      repos:
        description: "要同步的仓库（逗号分隔，空=全部）"
        type: string
        default: ""
  schedule:
    # 每 6 小时执行一次（UTC）
    - cron: "0 */6 * * *"

env:
  # 部署路径
  DEPLOY_DIR: /opt/lingmo-repo-sync
  CACHE_DIR: /var/cache/lingmo-repo-sync
  PUBLISH_ROOT: /var/www/aptly
  LOG_DIR: /opt/lingmo-repo-sync/logs

permissions:
  contents: write
  packages: write

jobs:
  sync:
    name: OBS → aptly Sync
    runs-on: ubuntu-latest

    # 生产环境建议使用自托管 runner
    # runs-on: [self-hosted, linux, x64]

    steps:
      # ======================================================
      # Step 1: 拉取代码
      # ======================================================
      - name: 拉取 repo-sync 代码
        uses: actions/checkout@v4
        with:
          path: repo-sync

      # ======================================================
      # Step 2: 安装依赖
      # ======================================================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            lftp \
            aptly \
            gnupg \
            gzip \
            bzip2 \
            xz-utils \
            ca-certificates \
            bc

      - name: 安装 rclone（用于 R2 同步）
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: 验证依赖
        run: |
          for cmd in rsync aptly gpg gzip bzip2 xz; do
            echo -n "Checking $cmd ... "
            command -v "$cmd" && echo "OK" || { echo "MISSING"; exit 1; }
          done

      # ======================================================
      # Step 3: 配置
      # ======================================================
      - name: 写入配置文件
        run: |
          cat > repo-sync/config.sh << 'CONFIGEOF'
          #!/usr/bin/env bash
          OBS_URL="https://download.opensuse.org/repositories/home:/LingmoOS/Debian_13/"
          CACHE_DIR="${{ env.CACHE_DIR }}"
          LOG_DIR="${{ env.LOG_DIR }}"
          REPO_NAMES=(
            "lingmo-stable"
            "lingmo-testing"
            "lingmo-unstable"
            "lingmo-experimental"
          )
          DISTRIBUTIONS=(
            "stable"
            "testing"
            "unstable"
            "experimental"
          )
          declare -A CODENAMES=(
            ["stable"]="lithium"
            ["testing"]="carbon"
          )
          ARCHS=("amd64")
          COMPONENT="main"
          PUBLISH_ROOT="${{ env.PUBLISH_ROOT }}"
          GPG_KEY="${{ secrets.GPG_KEY }}"
          SIGN=true
          LFTP_OPTIONS="--continue --parallel=8 --verbose"
          CONFIGEOF

          chmod +x repo-sync/*.sh

      - name: 创建必要目录
        run: |
          sudo mkdir -p "${{ env.CACHE_DIR }}"
          sudo mkdir -p "${{ env.PUBLISH_ROOT }}"
          sudo mkdir -p "${{ env.LOG_DIR }}"
          sudo mkdir -p "${{ env.DEPLOY_DIR }}"

      # ======================================================
      # Step 4: GPG 密钥
      # ======================================================
      - name: 导入 GPG 密钥
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY }}
          GPG_PRIV: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "${GPG_KEY_ID}" ] && [ -n "${GPG_PRIV}" ]; then
            # 同时为 runner 用户和 root 导入（后续 sudo 需要）
            echo "${GPG_PRIV}" | gpg --import --batch
            sudo mkdir -p /root/.gnupg
            sudo chmod 700 /root/.gnupg
            echo "${GPG_PRIV}" | sudo gpg --homedir /root/.gnupg --import --batch
            echo "GPG 密钥导入完成"
            gpg --list-keys "${GPG_KEY_ID}"
            sudo gpg --homedir /root/.gnupg --list-keys "${GPG_KEY_ID}"
            echo "gpg_key_id=${GPG_KEY_ID}" >> $GITHUB_OUTPUT
          else
            echo "GPG 密钥未配置，跳过签名"
          fi
        id: gpg-setup

      # ======================================================
      # Step 5: 拉取 OBS 仓库
      # ======================================================
      - name: 拉取 OBS 仓库（lftp mirror）
        id: download
        continue-on-error: true
        run: |
          cd repo-sync
          echo "::group::OBS lftp mirror"
          sudo bash download.sh
          echo "::endgroup::"

      - name: 检查 lftp 下载结果
        id: check-cache
        run: |
          CACHE="${{ env.CACHE_DIR }}"
          COUNT=$(find "$CACHE" -type f 2>/dev/null | wc -l)
          echo "缓存文件数: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "OBS lftp 下载失败，缓存为空，终止流程"
            exit 1
          fi

          echo "OBS 同步成功"

      # ======================================================
      # Step 7: 检查 aptly 状态
      # ======================================================
      - name: 检查 aptly 状态
        id: aptly-check
        run: |
          aptly db init 2>/dev/null || true
          echo "=== 现有 Repository ==="
          aptly repo list || echo "(无)"
          echo "=== 现有 Snapshot ==="
          aptly snapshot list || echo "(无)"
          echo "=== 已发布 ==="
          aptly publish list || echo "(无)"

      # ======================================================
      # Step 8: 配置 GPG 到 config.sh
      # ======================================================
      - name: 写入 GPG 配置
        run: |
          GPG_ID="${{ steps.gpg-setup.outputs.gpg_key_id }}"
          if [ -n "${GPG_ID}" ]; then
            sed -i "s|^GPG_KEY=.*|GPG_KEY=\"${GPG_ID}\"|" repo-sync/config.sh
            sed -i "s|^SIGN=.*|SIGN=true|" repo-sync/config.sh
            echo "GPG 已配置: ${GPG_ID}"
          else
            sed -i "s|^SIGN=.*|SIGN=false|" repo-sync/config.sh
            echo "GPG 未配置，跳过签名"
          fi

      # ======================================================
      # Step 9: 导入并创建快照
      # ======================================================
      - name: 导入并创建 Snapshot
        id: import
        env:
          IS_DRY: ${{ github.event.inputs.dry_run || 'false' }}
        if: env.IS_DRY != 'true'
        run: |
          cd repo-sync
          echo "::group::aptly 导入与快照"
          sudo bash import.sh
          echo "::endgroup::"

      # ======================================================
      # Step 10: 发布
      # ======================================================
      - name: 发布 Snapshot
        id: publish
        env:
          IS_DRY: ${{ github.event.inputs.dry_run || 'false' }}
        if: env.IS_DRY != 'true'
        run: |
          cd repo-sync
          echo "::group::aptly 发布"
          sudo bash publish.sh
          echo "::endgroup::"

      - name: 复制公钥到仓库 keys/
        if: ${{ steps.gpg-setup.outputs.gpg_key_id != '' }}
        run: |
          GPG_ID="${{ steps.gpg-setup.outputs.gpg_key_id }}"
          APTLY_ROOT=$(sudo aptly config show | awk -F'"' '/rootDir/ {print $4}')
          sudo mkdir -p "${APTLY_ROOT}/public/keys"
          gpg --armor --export "${GPG_ID}" | sudo tee "${APTLY_ROOT}/public/keys/lingmo.asc" > /dev/null
          echo "公钥已复制到仓库 keys/lingmo.asc"
          echo "用户添加: curl -fsSL https://apt.lingmo.org/keys/lingmo.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/lingmo.gpg"

      # # ======================================================
      # # Step 11: 同步到 Cloudflare R2
      # # ======================================================
      # - name: 同步到 Cloudflare R2
      #   id: r2-sync
      #   # if: ${{ steps.publish.outcome == 'success' && secrets.R2_ACCOUNT_ID != '' }}
      #   if: ${{ steps.publish.outcome == 'success' }}
      #   env:
      #     R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      #     R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      #     R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      #     R2_BUCKET: ${{ secrets.R2_BUCKET || 'lingmo-repo' }}
      #     R2_SYNC_ENABLED: true
      #   run: |
      #     cd repo-sync
      #     echo "::group::R2 同步"
      #     sudo -E bash r2_sync.sh
      #     echo "::endgroup::"

      # ======================================================
      # Step 12: 生成并部署 Cloudflare Pages 索引
      # ======================================================
      - name: 安装 wrangler（Cloudflare Pages CLI）
        # if: ${{ steps.publish.outcome == 'success' && secrets.CF_API_TOKEN != '' }}
        if: ${{ steps.publish.outcome == 'success' }}
        run: |
          npm install -g wrangler
          wrangler --version

      # - name: 生成 Pages 目录索引
      #   id: pages-generate
      #   # if: ${{ steps.publish.outcome == 'success' && secrets.CF_API_TOKEN != '' }}
      #   if: ${{ steps.publish.outcome == 'success' }}
      #   env:
      #     R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL || format('https://pub-{0}.r2.dev/lingmo-repo', secrets.R2_ACCOUNT_ID) }}
      #     PAGES_ENABLED: true
      #     PAGES_OUTPUT_DIR: /tmp/lingmo-pages
      #     CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT || 'lingmo-repo-index' }}
      #   run: |
      #     cd repo-sync
      #     echo "::group::生成 Pages 索引"
      #     bash pages_index.sh --no-deploy
      #     echo "::endgroup::"

      # - name: 部署到 Cloudflare Pages
      #   id: pages-deploy
      #   if: ${{ steps.pages-generate.outcome == 'success' }}
      #   env:
      #     CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      #     CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      #   run: |
      #     cd repo-sync
      #     echo "::group::部署 Pages"
      #     wrangler pages deploy /tmp/lingmo-pages \
      #       --project-name="${{ secrets.CF_PAGES_PROJECT || 'lingmo-repo-index' }}" \
      #       --branch=main \
      #       --commit-dirty=true
      #     echo "::endgroup::"

      # ======================================================
      # Step 13: 打包发布仓库      # ======================================================
      - name: 打包发布仓库
        id: package
        if: ${{ steps.publish.outcome == 'success' }}
        run: |
          PACKAGE="/tmp/repo-sync.tar.gz"
          echo "archive=${PACKAGE}" >> $GITHUB_OUTPUT

          APTLY_ROOT=$(sudo aptly config show | awk -F'"' '/rootDir/ {print $4}')
          APTLY_PUBLIC="${APTLY_ROOT}/public"
          echo "aptly 发布目录: ${APTLY_PUBLIC}"
          sudo ls -la "${APTLY_PUBLIC}" || echo "（目录为空）"

          echo "打包发布仓库: ${PACKAGE}"
          sudo tar czf "${PACKAGE}" -C "${APTLY_PUBLIC}" .

          echo "包大小: $(du -h "${PACKAGE}" | cut -f1)"

      # ======================================================
      # Step 12: 上传到 GitHub Release (packages)
      # ======================================================
      - name: 上传到 GitHub Release
        id: push
        if: ${{ steps.publish.outcome == 'success' && steps.package.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="${{ steps.package.outputs.archive }}"
          RELEASE_TAG="repo-sync-$(git log -1 --format=%cd --date=format:'%Y%m%d-%H%M%S')"
          echo "Release 文件: ${ARCHIVE}"
          ls -lh "${ARCHIVE}"
          SIZE=$(stat -c%s "${ARCHIVE}")
          # 确保 Release 存在（幂等）
          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --title "Lingmo Repo Sync Packages" \
            --notes "持续更新的 apt 仓库快照" \
            --target "${{ github.ref_name }}" \
            --latest=false 2>/dev/null || true
          # GitHub Release 单个文件限制 2GB，超过则分片上传
          if [ "${SIZE}" -gt 2147483648 ]; then
            echo "文件超过 2GB，分片上传"
            split -b 1900M "${ARCHIVE}" "${ARCHIVE}.part-"
            for part in "${ARCHIVE}".part-*; do
              echo "上传分片: $(basename "${part}") ($(du -h "${part}" | cut -f1))"
              gh release upload "${RELEASE_TAG}" "${part}" \
                --repo "${{ github.repository }}" \
                --clobber
            done
            echo "清理分片文件"
            rm -f "${ARCHIVE}".part-*
          else
            echo "上传完整文件"
            gh release upload "${RELEASE_TAG}" "${ARCHIVE}" \
              --repo "${{ github.repository }}" \
              --clobber
          fi
          echo "上传完成"

      # ======================================================
      # Step 17: 同步完成摘要
      # ======================================================
      - name: 同步完成摘要
        if: always()
        run: |
          echo "============================================"
          echo "  Lingmo Repository Sync 完成"
          echo "============================================"
          echo ""
          echo "下载:       ${{ steps.download.outcome }}"
          echo "GPG:        ${{ steps.gpg-setup.outputs.gpg_key_id || '未配置' }}"
          echo "导入:       ${{ steps.import.outcome }}"
          echo "发布:       ${{ steps.publish.outcome }}"
          echo "R2 同步:    ${{ steps.r2-sync.outcome || '跳过' }}"
          echo "Pages 生成: ${{ steps.pages-generate.outcome || '跳过' }}"
          echo "Pages 部署: ${{ steps.pages-deploy.outcome || '跳过' }}"
          echo "推送:       ${{ steps.push.outcome }}"
          echo ""
          echo "日志: ${{ env.LOG_DIR }}"
          ls -la "${{ env.LOG_DIR }}/" 2>/dev/null || echo "  无日志"
